version: '3.3'

services:
  luminor-api:
    container_name: luminor-api
    restart: always
    image: node:20.10.0
    ports:
      - 4041:3001
    volumes:
      - ./:/usr/src/luminor
    working_dir: /usr/src/luminor

    networks:
      - monorepo-network

    # FOR PRODUCTION
    command: bash -c "rm -rf dist && npm install && npm run build && npm run start:prod"

  luminor-batch:
    container_name: luminor-batch
    restart: unless-stopped
    image: node:20.10.0
    ports:
      - 4042:3002
    volumes:
      - ./:/usr/src/nestar
    working_dir: /usr/src/nestar

    networks:
      - monorepo-network

    # FOR PRODUCTION
    command: bash -c "npm install && npm run build && npm run start:prod:batch"

networks:
  monorepo-network:
    driver: bridge
# luminor-next:   localhost:4011 <=> container:3000
# luminor-api:   localhost:4041 <=> container:3001
# luminor-batch:   localhost:4042 <=> container:3002